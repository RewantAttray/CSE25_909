<!DOCTYPE html>
<html>
<head>
<title>Blinkit Clone</title>
</head>

<body style="margin:0;font-family:Arial;background:#f5f5f5;">

<!-- Header -->
<div style="background:#f7e600;padding:15px;display:flex;justify-content:space-between;align-items:center;">

<h1 style="margin:0;color:green;">blinkit</h1>

<input type="text" id="search"
placeholder="Search Products..."
onkeyup="searchProduct()"
style="width:300px;padding:10px;border-radius:5px;border:1px solid gray;">

<button style="background:green;color:white;padding:10px 15px;border:none;border-radius:5px;">
Cart (<span id="cart">0</span>)
</button>

</div>

<!-- Banner -->
<div style="background:white;text-align:center;padding:20px;margin:10px;border-radius:10px;">
<h2>India's Last Minute App</h2>
<p>Groceries Delivered In Minutes</p>
</div>

<!-- Products -->
<div id="products" style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:20px;">

<div class="product" style="background:white;width:220px;padding:15px;text-align:center;border-radius:10px;">
<img src="https://images.unsplash.com/photo-1550583724-b2692b85b150?w=300"
width="180" height="150">
<h3>Milk</h3>
<p>₹60</p>
<button onclick="addCart()" style="background:green;color:white;border:none;padding:10px;border-radius:5px;">
Add to Cart
</button>
</div>

<div class="product" style="background:white;width:220px;padding:15px;text-align:center;border-radius:10px;">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300"
width="180" height="150">
<h3>Bread</h3>
<p>₹40</p>
<button onclick="addCart()" style="background:green;color:white;border:none;padding:10px;border-radius:5px;">
Add to Cart
</button>
</div>

<div class="product" style="background:white;width:220px;padding:15px;text-align:center;border-radius:10px;">
<img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=300"
width="180" height="150">
<h3>Apple</h3>
<p>₹120/kg</p>
<button onclick="addCart()" style="background:green;color:white;border:none;padding:10px;border-radius:5px;">
Add to Cart
</button>
</div>

<div class="product" style="background:white;width:220px;padding:15px;text-align:center;border-radius:10px;">
<img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=300"
width="180" height="150">
<h3>Potato</h3>
<p>₹30/kg</p>
<button onclick="addCart()" style="background:green;color:white;border:none;padding:10px;border-radius:5px;">
Add to Cart
</button>
</div>

</div>

<!-- Footer -->
<div style="background:#333;color:white;text-align:center;padding:15px;">
<h3>Blinkit Clone Project</h3>
<p>B.Tech CSE 2nd Semester AKTU</p>
</div>

<script>

let count = 0;

function addCart()
{
count++;
document.getElementById("cart").innerHTML = count;
}

function searchProduct()
{
let input =
document.getElementById("search").value.toUpperCase();

let products =
document.getElementsByClassName("product");

for(let i=0;i<products.length;i++)
{
let name =
products[i].getElementsByTagName("h3")[0];

if(name.innerHTML.toUpperCase().indexOf(input)>-1)
{
products[i].style.display="";
}
else
{
products[i].style.display="none";
}
}
}

</script>

</body>
</html>
