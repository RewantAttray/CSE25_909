<!DOCTYPE html>
<html>
<head>
    <title>Reverse a Number</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f0f8ff;
        }

        .container {
            width: 350px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
            font-size: 16px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            font-size: 20px;
            font-weight: bold;
            color: green;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reverse a Number</h2>

    <input type="number" id="num" placeholder="Enter a number">

    <button onclick="reverseNumber()">Reverse</button>

    <div id="result"></div>
</div>

<script>
function reverseNumber() {
    let num = parseInt(document.getElementById("num").value);
    let reverse = 0;

    while (num > 0) {
        let digit = num % 10;
        reverse = reverse * 10 + digit;
        num = Math.floor(num / 10);
    }

    document.getElementById("result").innerHTML =
        "Reversed Number: " + reverse;
}
</script>

</body>
</html>
